<!DOCTYPE html>
<html>

<head lang="en">
    <title>Tipply Settings</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
</head>

<body>
    <sdpi-item label="Status">
        <div>
            <div id="connection-title">Checking Tipply connection...</div>
        </div>
    </sdpi-item>

    <sdpi-item label="auth_token">
        <input id="auth-cookie" type="password" autocomplete="off" placeholder="Paste token to connect or replace" />
    </sdpi-item>

    <sdpi-item>
        <a href="https://tipply-sdk.przxmus.dev/authentication/#jak-pobra%C4%87-auth_token-z-devtools"
            target="_blank">How to get auth_token?</a>
    </sdpi-item>

    <script src="./increment-counter.js"></script>
</body>

</html>
