<!DOCTYPE html>
<html>

<head lang="en">
    <title>Tipply Settings</title>
    <meta charset="utf-8" />
    <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
    <style>
        :root {
            color-scheme: dark;
        }

        body {
            margin: 0;
            padding: 0;
            font: 12px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #f5f7fa;
            background: #131518;
        }

        .panel {
            padding: 14px 14px 18px;
        }

        .stack {
            display: grid;
            gap: 12px;
        }

        .card {
            display: grid;
            gap: 10px;
            padding: 12px;
            border: 1px solid #2a2f36;
            border-radius: 10px;
            background: #1b1f24;
        }

        .status {
            display: grid;
            gap: 4px;
        }

        .status strong {
            font-size: 13px;
            font-weight: 600;
        }

        .status p,
        .hint,
        .meta {
            margin: 0;
            color: #aeb7c2;
        }

        .hint {
            font-size: 11px;
        }

        .field {
            display: grid;
            gap: 6px;
        }

        .field label {
            font-size: 11px;
            color: #cfd6de;
        }

        .field select,
        .field input {
            box-sizing: border-box;
            width: 100%;
            min-height: 34px;
            padding: 8px 10px;
            border: 1px solid #3a424d;
            border-radius: 8px;
            color: #f5f7fa;
            background: #111417;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .actions button {
            flex: 1;
            min-height: 34px;
            padding: 8px 10px;
            border: 1px solid #3a424d;
            border-radius: 8px;
            color: #f5f7fa;
            background: #242a31;
            cursor: pointer;
        }

        .actions button[data-variant="primary"] {
            border-color: #6e5332;
            background: #5b4023;
        }

        .actions button:disabled {
            opacity: 0.55;
            cursor: default;
        }

        .divider {
            height: 1px;
            background: #2a2f36;
        }
    </style>
</head>

<body>
    <main class="panel">
        <div class="stack">
            <section class="card status">
                <strong id="connection-title">Checking Tipply connection...</strong>
                <p id="connection-description">Loading current authorization state.</p>
                <p id="connection-meta" class="meta"></p>
            </section>

            <section class="card">
                <div class="field">
                    <label for="command">Button action</label>
                    <select id="command">
                        <option value="resendLastDonation">Resend last donate</option>
                        <option value="skipCurrentDonation">Skip current donate</option>
                    </select>
                </div>
            </section>

            <section class="card">
                <div class="field">
                    <label for="auth-cookie">Tipply auth_token cookie</label>
                    <input id="auth-cookie" type="password" autocomplete="off"
                        placeholder="Paste the current auth_token value" />
                </div>

                <p class="hint">
                    Open Tipply in your browser, sign in, then paste the fresh <code>auth_token</code> cookie value
                    here. The cookie is validated by the plugin before it is saved.
                </p>

                <div class="actions">
                    <button id="open-dashboard" type="button">Open Tipply</button>
                    <button id="connect" type="button" data-variant="primary">Connect</button>
                </div>

                <div class="divider"></div>

                <div class="actions">
                    <button id="disconnect" type="button">Disconnect</button>
                </div>
            </section>
        </div>
    </main>

    <script src="./increment-counter.js"></script>
</body>

</html>
